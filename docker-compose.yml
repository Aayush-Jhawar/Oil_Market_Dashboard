version: '3.8'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: energy_dashboard
      POSTGRES_USER: dashboard_user
      POSTGRES_PASSWORD: dev_password_change_in_production
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    environment:
      - ALLOW_EMPTY_PASSWORD=yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    environment:
      DATABASE_URL: postgresql://dashboard_user:dev_password_change_in_production@postgres:5432/energy_dashboard
      EIA_API_KEY: ${EIA_API_KEY}
      HF_API_KEY: ${HF_API_KEY}
      PYTHONUNBUFFERED: 1
    ports:
      - "8000:8000"
    depends_on:
      - postgres
    command: cd backend && python -m uvicorn main:app --host 0.0.0.0 --port 8000

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      VITE_API_URL: http://backend:8000
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
